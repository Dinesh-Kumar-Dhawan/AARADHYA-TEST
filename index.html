<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aaradhya — An Interactive Edition</title>
  <meta name="description" content="A digital coffee-table edition of Aaradhya: three residences, five amenities, in one quiet volume.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Inter:wght@300;400;500&family=Italiana&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- ============ CUSTOM CURSOR ============ -->
  <div class="cursor-dot" id="cursorDot" aria-hidden="true"></div>
  <div class="cursor-ring" id="cursorRing" aria-hidden="true">
    <span class="cursor-label" id="cursorLabel"></span>
  </div>

  <!-- ============ HEADER ============ -->
  <header class="header">
    <a href="#" class="brand" aria-label="Aaradhya — home">
      <img src="logo/Logo.png" alt="Aaradhya" class="brand-logo" />
    </a>
  </header>

  <!-- ============ AMBIENT BACKGROUND (cover scene) ============ -->
  <div class="ambient" id="ambient">
    <div class="ambient-scene" id="ambientScene"></div>
    <div class="ambient-veil"></div>
    <div class="ambient-vignette"></div>
  </div>

  <!-- hero content (Prime Video-style): eyebrow + title + desc + CTAs -->
  <div class="cover" id="cover">
    <div class="cover-content">
      <div class="cover-eyebrow">
        <span class="cover-eyebrow-bar"></span>
        <span id="coverEyebrowText">Chapter I · Overview</span>
      </div>
      <h1 class="cover-title" id="coverTitle">Elevation</h1>
      <p class="cover-desc" id="coverDesc">—</p>
      <div class="cover-ctas">
        <button class="cover-cta-primary" id="coverPlay" aria-label="open chapter">
          <svg class="cover-cta-play" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M8 5 L20 12 L8 19 Z" fill="currentColor"/>
          </svg>
          <span>Enter</span>
        </button>
      </div>
    </div>
    <div class="cover-dots" id="coverDots" aria-label="chapter navigation"></div>
  </div>

  <!-- ============ PAGE INDICATOR ============ -->
  <div class="page-indicator" id="pageIndicator">
    <span class="page-current" id="pageCurrent">01</span>
    <div class="page-rail"><div class="page-fill" id="pageFill"></div></div>
    <span class="page-total" id="pageTotal">11</span>
  </div>

  <!-- ============ CAROUSEL ============ -->
  <div class="carousel">
    <button class="carousel-arrow carousel-prev" id="carPrev" aria-label="previous chapter">
      <svg viewBox="0 0 32 32"><path d="M20 8 L12 16 L20 24" fill="none" stroke="currentColor" stroke-width="1"/></svg>
    </button>

    <div class="carousel-track" id="carTrack">
      <!-- cards injected by JS -->
    </div>

    <button class="carousel-arrow carousel-next" id="carNext" aria-label="next chapter">
      <svg viewBox="0 0 32 32"><path d="M12 8 L20 16 L12 24" fill="none" stroke="currentColor" stroke-width="1"/></svg>
    </button>
  </div>

  <!-- ============ DETAIL VIEW ============ -->
  <div class="detail" id="detail" aria-hidden="true" role="dialog">
    <div class="detail-bg" id="detailBg"></div>
    <div class="detail-overlay"></div>

    <button class="detail-back" id="detailBack">
      <span class="detail-back-arrow">←</span>
      <span class="detail-back-label">Back to Contents</span>
    </button>

    <!-- detail text removed — scene is image only -->

    <div class="cta-strip" id="ctaStrip">
      <div class="cta-tiles" id="ctaTiles">
        <!-- chapter buttons injected -->
      </div>
    </div>

    <button class="detail-side detail-side-prev" id="detailPrev" aria-label="previous card">‹</button>
    <button class="detail-side detail-side-next" id="detailNext" aria-label="next card">›</button>
  </div>

  <!-- ============ VIDEO PLAYER ============ -->
  <div class="player" id="player" aria-hidden="true" role="dialog">
    <div class="player-stage" id="playerStage">
      <div class="player-scene" id="playerScene"></div>
    </div>
    <div class="player-vignette"></div>
    <div class="player-play-pulse" id="playPulse"></div>

    <!-- chapter pills overlaid on the video; appear on touch, fade when idle -->
    <div class="player-ctas" id="playerCtas"></div>

    <header class="player-top" id="playerTop">
      <div class="player-meta">
        <div class="player-eb" id="pEyebrow">—</div>
        <div class="player-tt" id="pTitle">—</div>
      </div>
    </header>

    <div class="player-bottom" id="playerBottom">
      <div class="player-progress-row">
        <button class="player-icon-btn" id="pPlay" aria-label="play/pause">
          <svg class="icon-play" viewBox="0 0 24 24"><path d="M8 5 L20 12 L8 19 Z" fill="currentColor"/></svg>
          <svg class="icon-pause" viewBox="0 0 24 24"><path d="M7 5 H11 V19 H7 Z M13 5 H17 V19 H13 Z" fill="currentColor"/></svg>
        </button>
        <div class="player-track" id="pTrack">
          <div class="player-fill" id="pFill"></div>
          <div class="player-dot"></div>
        </div>
        <div class="player-time">
          <span id="pCur">0:00</span>
          <span class="time-sep">·</span>
          <span id="pDur">0:42</span>
        </div>
      </div>
      <div class="player-controls">
        <div class="pc-left">
          <button id="pMute" aria-label="toggle sound">
            <span class="mute-on">♪ Sound</span>
            <span class="mute-off">Muted</span>
          </button>
        </div>
        <div class="pc-right">
          <button id="pPrev">← Previous</button>
          <span class="pc-sep">·</span>
          <button id="pNext">Next Chapter →</button>
          <button class="player-close" id="pClose" aria-label="close">
            <svg viewBox="0 0 24 24"><path d="M6 6 L18 18 M18 6 L6 18" stroke="currentColor" stroke-width="1.2" fill="none"/></svg>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- ============ HERO VIEW SWITCHER (3 explicit toggles) ============ -->
  <div class="view-switcher" id="viewSwitcher" role="tablist" aria-label="hero view">
    <button class="view-btn" data-view="carousel" aria-pressed="true" aria-label="Carousel view">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <rect x="2"  y="8"  width="5"  height="8"  fill="none" stroke="currentColor" stroke-width="1.3"/>
        <rect x="9"  y="5"  width="6"  height="14" fill="none" stroke="currentColor" stroke-width="1.6"/>
        <rect x="17" y="8"  width="5"  height="8"  fill="none" stroke="currentColor" stroke-width="1.3"/>
      </svg>
    </button>
    <button class="view-btn" data-view="list" aria-pressed="false" aria-label="List view">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <line x1="3" y1="6"  x2="21" y2="6"  stroke="currentColor" stroke-width="1.3"/>
        <line x1="3" y1="12" x2="21" y2="12" stroke="currentColor" stroke-width="1.3"/>
        <line x1="3" y1="18" x2="21" y2="18" stroke="currentColor" stroke-width="1.3"/>
      </svg>
    </button>
  </div>

  <!-- ============ ALTERNATIVE HERO: SECTION LIST ============ -->
  <aside class="section-list" id="sectionList" aria-label="sections"></aside>
  <div class="list-ctas" id="listCtas" aria-label="chapters"></div>

  <!-- ============ FILM GRAIN OVERLAY ============ -->
  <div class="grain" aria-hidden="true"></div>

  <script type="module" src="script.js"></script>
</body>
</html>
